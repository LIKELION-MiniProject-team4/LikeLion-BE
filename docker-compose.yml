services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wiki
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - mysql
    env_file:
      - .env
    environment:
      # 컨테이너 내부에서는 localhost가 아니라 서비스명(mysql)으로 접근해야 함
      DB_URL: jdbc:mysql://mysql:3306/wiki?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    ports:
      - "8080:8080"

volumes:
  mysql-data:
