spring:
  application:
    name: Professor-info-system
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/wiki?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 1296000000

app:
  security:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8080
      - http://127.0.0.1:5500

# 실제 S3 버킷 준비되면 환경변수(AWS_REGION 등)로 채울 것. 지금은 로컬 부팅만 되게 기본값 넣어둠.
cloud:
  aws:
    region: ${AWS_REGION:ap-northeast-2}
    credentials:
      access-key: ${AWS_S3_ACCESS_KEY_ID:changeme}
      secret-key: ${AWS_S3_SECRET_ACCESS_KEY:changeme}
    s3:
      bucket: ${AWS_S3_BUCKET_NAME:changeme}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
